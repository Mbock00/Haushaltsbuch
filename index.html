<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<meta content="#6c8ebf" name="theme-color"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="default" name="apple-mobile-web-app-status-bar-style"/>
<meta content="Haushaltsbuch" name="apple-mobile-web-app-title"/>
<meta content="Persönliches Haushaltsbuch mit Sync" name="description"/>
<link href="manifest.json" rel="manifest"/>
<link href="icons/icon-192.png" rel="apple-touch-icon"/>
<link href="css/style.css" rel="stylesheet"/>
<title>Mein Haushaltsbuch</title>
</head>
<body>
<!-- ══════════════════════════════════════════
     AUTH SCREEN
══════════════════════════════════════════ -->
<div id="auth-screen">
<div class="auth-card">
<div class="auth-logo">
<span class="logo-icon">🏠</span>
<h1>Haushaltsbuch</h1>
<p>Deine Finanzen im Griff</p>
</div>
<div class="auth-tabs">
<button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Anmelden</button>
<button class="auth-tab" data-tab="register" onclick="switchAuthTab('register')">Registrieren</button>
</div>
<!-- Login -->
<form class="auth-form" id="form-login" onsubmit="handleLogin(event)">
<div class="form-group">
<label class="form-label">E-Mail</label>
<input autocomplete="email" class="form-input" id="login-email" placeholder="deine@email.de" required="" type="email"/>
</div>
<div class="form-group">
<label class="form-label">Passwort</label>
<input autocomplete="current-password" class="form-input" id="login-password" placeholder="••••••••" required="" type="password"/>
</div>
<button class="btn btn-primary" id="btn-login" type="submit">🔑 Anmelden</button>
<button class="btn btn-secondary" onclick="handlePasswordReset()" style="font-size:0.85rem;" type="button">Passwort vergessen?</button>
</form>
<!-- Register -->
<form class="auth-form hidden" id="form-register" onsubmit="handleRegister(event)">
<div class="form-group">
<label class="form-label">Dein Name</label>
<input autocomplete="name" class="form-input" id="reg-name" placeholder="z.B. Max" required="" type="text"/>
</div>
<div class="form-group">
<label class="form-label">E-Mail</label>
<input autocomplete="email" class="form-input" id="reg-email" placeholder="deine@email.de" required="" type="email"/>
</div>
<div class="form-group">
<label class="form-label">Passwort (min. 8 Zeichen)</label>
<input autocomplete="new-password" class="form-input" id="reg-password" minlength="8" placeholder="••••••••" required="" type="password"/>
</div>
<div class="form-group">
<label class="form-label">Passwort wiederholen</label>
<input autocomplete="new-password" class="form-input" id="reg-password2" placeholder="••••••••" required="" type="password"/>
</div>
<div class="form-group">
<label class="form-label">Einladungscode</label>
<input class="form-input" id="reg-code" placeholder="Code eingeben" required="" type="text"/>
<div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;">Den Code erhältst du vom App-Administrator</div>
</div>
<button class="btn btn-primary" id="btn-register" type="submit">✅ Konto erstellen</button>
</form>
</div>
</div>
<!-- ══════════════════════════════════════════
     HAUPT-APP
══════════════════════════════════════════ -->
<div id="app">
<!-- Header -->
<header class="app-header">
<div class="header-left">
<span class="header-logo">🏠</span>
<div>
<div class="header-title" id="header-title">Haushaltsbuch</div>
<div class="header-subtitle" id="header-sub">Übersicht</div>
</div>
</div>
<div class="header-right">
<button class="btn-icon" id="btn-install" onclick="installPWA()" style="display:none;" title="App installieren">📲</button>
<div class="btn-icon profil-avatar" id="header-avatar" onclick="navigateTo('mehr');setMehrTab('profil')" style="background:#6c8ebf;color:white;font-weight:700;font-size:1rem;cursor:pointer;">?
      </div>
</div>
</header>
<!-- Desktop Sidebar -->
<nav class="app-sidebar" id="app-sidebar">
<div class="sidebar-label">Hauptmenü</div>
<button class="sidebar-item active" data-screen="dashboard" onclick="navigateTo('dashboard')">
<span class="nav-icon">🏠</span> Dashboard
    </button>
<button class="sidebar-item" data-screen="buchungen" onclick="navigateTo('buchungen')">
<span class="nav-icon">📝</span> Buchungen
    </button>
<button class="sidebar-item" data-screen="auswertungen" onclick="navigateTo('auswertungen')">
<span class="nav-icon">📊</span> Auswertungen
    </button>
<div class="sidebar-divider"></div>
<div class="sidebar-label">Verwaltung</div>
<button class="sidebar-item" onclick="navigateTo('mehr');setMehrTab('dauerauftraege')">
<span class="nav-icon">🔄</span> Daueraufträge
    </button>
<button class="sidebar-item" onclick="navigateTo('mehr');setMehrTab('sparziele')">
<span class="nav-icon">🐷</span> Sparziele
    </button>
<button class="sidebar-item" onclick="navigateTo('mehr');setMehrTab('budget')">
<span class="nav-icon">💰</span> Budgetplanung
    </button>
<div class="sidebar-divider"></div>
<div class="sidebar-label">Konto</div>
<button class="sidebar-item" onclick="navigateTo('mehr');setMehrTab('profil')">
<span class="nav-icon">👤</span> Profil
    </button>
<button class="sidebar-item" onclick="handleLogout()">
<span class="nav-icon">🚪</span> Abmelden
    </button>
</nav>
<!-- Main Content -->
<main class="app-main">
<div class="screen active" id="screen-dashboard">
<div class="loading"><div class="spinner"></div></div>
</div>
<div class="screen" id="screen-buchungen">
<div class="loading"><div class="spinner"></div></div>
</div>
<div class="screen" id="screen-auswertungen">
<div class="loading"><div class="spinner"></div></div>
</div>
<div class="screen" id="screen-mehr">
<div class="loading"><div class="spinner"></div></div>
</div>
</main>
<!-- Bottom Navigation (Mobile) -->
<nav class="bottom-nav">
<button class="nav-item active" data-screen="dashboard" onclick="navigateTo('dashboard')">
<span class="nav-icon">🏠</span>
<span class="nav-label">Dashboard</span>
</button>
<button class="nav-item" data-screen="buchungen" onclick="navigateTo('buchungen')">
<span class="nav-icon">📝</span>
<span class="nav-label">Buchungen</span>
</button>
<button class="nav-item" data-screen="auswertungen" onclick="navigateTo('auswertungen')">
<span class="nav-icon">📊</span>
<span class="nav-label">Auswertung</span>
</button>
<button class="nav-item" data-screen="mehr" onclick="navigateTo('mehr')">
<span class="nav-icon">⚙️</span>
<span class="nav-label">Mehr</span>
</button>
</nav>
</div>
<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleModalClick(event)"></div>
<!-- Toast -->
<div class="toast-container" id="toast-container"></div>
<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/buchungen.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/auswertungen.js"></script>
<script src="js/dauerauftraege.js"></script>
<script src="js/sparziele.js"></script>
<script src="js/app.js"></script>
<script>
function handleModalClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
window.addEventListener('popstate', () => {
  if (document.getElementById('modal-overlay').classList.contains('open')) closeModal();
});
</script>
</body>
</html>
